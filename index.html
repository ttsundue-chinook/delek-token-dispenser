<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delek Hospital - Token System</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0056b3; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-print { background-color: #28a745; color: white; }
        .btn-export { background-color: #17a2b8; color: white; }
        .btn-connect { background-color: #6c757d; color: white; }
        .history { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; font-size: 14px; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        .status { text-align: center; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Delek Hospital</h2>
    <div id="printer-status" class="status">Printer: 🔴 Not Connected</div>
    <button class="btn-connect" onclick="connectPrinter()">Step 1: Connect Bluetooth Printer</button>

    <hr>

    <label>Patient Name</label>
    <input type="text" id="pName" placeholder="Enter Full Name">

    <label>Age</label>
    <input type="number" id="pAge" placeholder="Enter Age">

    <label>Nationality</label>
    <select id="pNationality">
        <option value="Tibetan">Tibetan</option>
        <option value="Indian">Indian</option>
        <option value="Other">Other</option>
    </select>

    <label>Phone Number (Optional)</label>
    <input type="tel" id="pPhone" placeholder="10-digit number">

    <button class="btn-print" onclick="issueToken()">Issue & Print Token</button>
    <button class="btn-export" onclick="exportData()">Export Records (CSV)</button>

    <div class="history">
        <h3>Recent Tokens</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let printerDevice = null;
    let characteristic = null;
    let records = JSON.parse(localStorage.getItem('delek_records') || '[]');

    // 1. Connect to Bluetooth Printer
    async function connectPrinter() {
        try {
            printerDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }, { namePrefix: 'Printer' }, { namePrefix: 'MTP' }],
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
            });
            const server = await printerDevice.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            const characteristics = await service.getCharacteristics();
            characteristic = characteristics.find(c => c.properties.write);
            
            document.getElementById('printer-status').innerText = "Printer: 🟢 Connected";
            alert("Printer Connected Successfully!");
        } catch (error) {
            console.log(error);
            alert("Connection Failed. Make sure Bluetooth is ON and you're using Chrome/Edge (Android/PC) or Bluefy (iOS).");
        }
    }

    // 2. Issue Token & Save Data
    function issueToken() {
        const name = document.getElementById('pName').value;
        const age = document.getElementById('pAge').value;
        const nationality = document.getElementById('pNationality').value;
        const phone = document.getElementById('pPhone').value;

        if (!name || !age) return alert("Please fill Name and Age.");

        const tokenNo = records.length + 1;
        const timestamp = new Date().toLocaleString();

        const entry = { tokenNo, name, age, nationality, phone, timestamp };
        records.push(entry);
        localStorage.setItem('delek_records', JSON.stringify(records));

        updateHistory();
        printToken(entry);
    }

    // 3. Printing Logic (ESC/POS Commands)
    async function printToken(data) {
        if (!characteristic) return alert("Please connect the printer first!");

        const encoder = new TextEncoder();
        // ESC/POS Command Sequences
        const init = "\x1B\x40";           // Reset printer
        const center = "\x1B\x61\x01";     // Align Center
        const left = "\x1B\x61\x00";       // Align Left
        const boldOn = "\x1B\x45\x01";     // Bold On
        const boldOff = "\x1B\x45\x00";    // Bold Off
        const sizeBig = "\x1D\x21\x11";    // Double size text
        const sizeNormal = "\x1D\x21\x00"; // Normal size
        const feed = "\n\n\n\n";           // Space for tearing

        let receipt = init + center + "Delek Hospital\n" + 
                      "------------------------------\n" +
                      boldOn + sizeBig + "TOKEN: " + data.tokenNo + boldOff + sizeNormal + "\n" +
                      "------------------------------\n" +
                      left + "Name: " + data.name + "\n" +
                      "Age: " + data.age + "\n" +
                      "Time: " + data.timestamp + "\n" +
                      center + "Thank You\n" + feed;

        await characteristic.writeValue(encoder.encode(receipt));
    }

    // 4. Update History Table
    function updateHistory() {
        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = records.slice(-5).reverse().map(r => `
            <tr>
                <td>${r.tokenNo}</td>
                <td>${r.name}</td>
                <td><button onclick='reprint(${r.tokenNo})' style="padding:5px; margin:0; font-size:12px;">Reprint</button></td>
            </tr>
        `).join('');
    }

    function reprint(tNo) {
        const data = records.find(r => r.tokenNo === tNo);
        if (data) printToken(data);
    }

    // 5. Export to CSV
    function exportData() {
        let csv = "Token No,Name,Age,Nationality,Phone,Timestamp\n";
        records.forEach(r => {
            csv += `${r.tokenNo},"${r.name}",${r.age},${r.nationality},"${r.phone}",${r.timestamp}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('hidden', '');
        a.setAttribute('href', url);
        a.setAttribute('download', 'Delek_Hospital_Records.csv');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // Load history on start
    updateHistory();
</script>

</body>
</html>
