<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delek Hospital - USB Token System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d32f2f; margin-top: 0; border-bottom: 2px solid #f44336; padding-bottom: 10px; }
        .status { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; border: 1px solid #ddd; }
        label { display: block; margin: 12px 0 5px; font-size: 0.9em; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-connect { background: #2196F3; color: white; }
        .btn-print { background: #4CAF50; color: white; margin-top: 25px; }
        .btn-export { background: #607D8B; color: white; margin-top: 10px; }
        .history-section { margin-top: 30px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fafafa; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-reprint { padding: 5px 10px; background: #ff9800; color: white; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Delek Hospital</h2>
    <div id="status" class="status">Printer: ⚪ Not Connected</div>
    
    <button class="btn-connect" onclick="connectUSB()">1. Pair USB Printer</button>

    <label>Patient Name</label>
    <input type="text" id="pName" placeholder="Full Name">

    <label>Age</label>
    <input type="number" id="pAge" placeholder="Age">

    <label>Nationality</label>
    <select id="pNationality">
        <option value="Tibetan">Tibetan</option>
        <option value="Indian">Indian</option>
        <option value="Other">Other</option>
    </select>

    <label>Phone (Optional)</label>
    <input type="tel" id="pPhone" placeholder="Mobile Number">

    <button class="btn-print" onclick="processNewToken()">Issue & Print Token</button>
    <button class="btn-export" onclick="exportToCSV()">Export Data to CSV</button>

    <div class="history-section">
        <h3>Recent Tokens (Reprint)</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let device;
    let records = JSON.parse(localStorage.getItem('delek_db') || '[]');

    // --- USB CONNECTION LOGIC ---
    async function connectUSB() {
        try {
            // Requesting USB device access
            device = await navigator.usb.requestDevice({ filters: [] }); 
            await device.open();
            
            // Select configuration and claim interface (usually index 0 for printers)
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0); 
            
            document.getElementById('status').innerText = "Printer: 🟢 Ready (USB)";
            document.getElementById('status').style.color = "green";
        } catch (err) {
            console.error(err);
            alert("Failed to connect. Ensure the printer is ON and connected via USB.");
        }
    }

    // --- PRINTING LOGIC ---
    async function printData(data) {
        if (!device) return alert("Please click 'Pair USB Printer' first!");

        const encoder = new TextEncoder();
        
        // ESC/POS Formatting
        const esc = {
            init: '\x1B\x40',
            center: '\x1B\x61\x01',
            left: '\x1B\x61\x00',
            boldOn: '\x1B\x45\x01',
            boldOff: '\x1B\x45\x00',
            sizeLarge: '\x1D\x21\x11',
            sizeNormal: '\x1D\x21\x00',
            feed: '\n\n\n\n\x1D\x56\x41\x03' // Feed and Cut
        };

        const content = 
            esc.init + esc.center + 
            "DELEK HOSPITAL\n" +
            "------------------------------\n" +
            esc.boldOn + esc.sizeLarge + "TOKEN: " + data.tokenNo + esc.sizeNormal + esc.boldOff + "\n" +
            "------------------------------\n" +
            esc.left + "Patient: " + data.name + "\n" +
            "Age: " + data.age + "\n" +
            "Date: " + data.timestamp + "\n" +
            esc.center + "Please wait for your turn\n" +
            esc.feed;

        const dataBuffer = encoder.encode(content);
        
        // Find the OUT endpoint (usually index 1 or 2)
        const endpoint = device.configuration.interfaces[0].alternate.endpoints.find(e => e.direction === 'out');
        await device.transferOut(endpoint.endpointNumber, dataBuffer);
    }

    // --- DATA HANDLING ---
    function processNewToken() {
        const name = document.getElementById('pName').value;
        const age = document.getElementById('pAge').value;
        const nationality = document.getElementById('pNationality').value;
        const phone = document.getElementById('pPhone').value || "N/A";

        if(!name || !age) return alert("Fill required fields.");

        const tokenNo = records.length + 1;
        const timestamp = new Date().toLocaleString('en-IN');

        const entry = { tokenNo, name, age, nationality, phone, timestamp };
        records.push(entry);
        localStorage.setItem('delek_db', JSON.stringify(records));

        renderHistory();
        printData(entry);
        
        // Clear inputs
        document.getElementById('pName').value = "";
        document.getElementById('pAge').value = "";
    }

    function renderHistory() {
        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = records.slice(-5).reverse().map(r => `
            <tr>
                <td>${r.tokenNo}</td>
                <td>${r.name}</td>
                <td><button class="btn-reprint" onclick="reprintToken(${r.tokenNo})">Reprint</button></td>
            </tr>
        `).join('');
    }

    function reprintToken(num) {
        const data = records.find(r => r.tokenNo === num);
        if(data) printData(data);
    }

    function exportToCSV() {
        let csv = "TokenNo,Name,Age,Nationality,Phone,Timestamp\n";
        records.forEach(r => {
            csv += `${r.tokenNo},"${r.name}",${r.age},${r.nationality},"${r.phone}","${r.timestamp}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Delek_Records_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    renderHistory();
</script>

</body>
</html>
